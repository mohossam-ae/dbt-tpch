version: 2

models:

    - name: dim_customer
      description: >
          Customer dimension — SCD-2 slowly changing dimension. History rows
          are distinguished by `customer_sk` (surrogate key); `customer_key`
          is the natural key shared across history rows for the same customer.
      columns:
          - name: customer_sk
            description: Surrogate key — one row per (customer, history version).
            data_type: bigint
            tests:
                - unique
                - not_null

          - name: customer_key
            description: Natural key — FK from fct_orders / fct_orders_items.
            data_type: integer
            tests:
                - not_null

          - name: customer_name
            data_type: varchar

          - name: customer_address
            data_type: varchar

          - name: customer_nation_key
            description: FK to dim nation (denormalized onto dim_customer).
            data_type: integer

          - name: customer_nation_name
            data_type: varchar

          - name: customer_region_key
            description: FK to dim region (denormalized onto dim_customer).
            data_type: integer

          - name: customer_region_name
            data_type: varchar

          - name: customer_phone_number
            data_type: varchar

          - name: customer_account_balance
            data_type: decimal

          - name: customer_market_segment_name
            data_type: varchar

          - name: effective_date
            description: SCD-2 effective-from timestamp.
            data_type: timestamp
            tests:
                - not_null

          - name: valid_to
            description: SCD-2 effective-to timestamp.
            data_type: timestamp
            tests:
                - not_null

          - name: is_current
            description: SCD-2 current-row flag. True for the latest row per customer_key.
            data_type: boolean
            tests:
                - not_null
